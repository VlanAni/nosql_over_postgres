syntax = "proto3"; 

package doc_store_api;

option go_package = "github.com/VlanAni/nosql_over_postgres/internal/docstoreAPI";

service DocumentStore {
    rpc PutDocument(PutRequest) returns (PutResponse);
    rpc DeleteDocument(DeleteRequest) returns (DeleteResponse);
    rpc GetDocument(GetRequest) returns (GetResponse);
}

// document and payload for it 
message PutRequest {
    string collection_name = 1; 
    string doc_id = 2; 
    bytes payload = 3; 
} 

// id of the downloaded document 
message PutResponse {
    string collection_name = 1; 
    string doc_id = 2; 
}

// id of the document to delete
message DeleteRequest {
    string collection_name = 1; 
    string doc_id = 2;
} 

// id of the deleted document 
message DeleteResponse {
    string collection_name = 1; 
    string doc_id = 2; 
}

// id of the document to get
message GetRequest {
    string collection_name = 1; 
    string doc_id = 2;
} 

// payload of the retrieved document 
message GetResponse {
    string collection_name = 1; 
    string doc_id = 2; 
    bytes payload = 3; 
}