services: 
  postgresdb: 
    image: postgres:15
    container_name: psdatabase
    env_file: "database.env"
    ports: 
      - "5432:5432"
    volumes: 
      - pg_data:/var/lib/postgresql/data 
    restart: unless-stopped 
    networks: 
      - app_network

volumes: 
  pg_data: 

networks: 
  app_network: 
    driver: bridge